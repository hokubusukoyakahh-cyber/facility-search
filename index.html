<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>東京都指定医療機関検索</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  max-width:1200px;
  margin:auto;
  padding:16px;
  background:#f5f5f5;
}

h1{
  text-align:center;
}

.card{
  background:white;
  border-radius:12px;
  padding:16px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input[type=text]{
  width:100%;
  padding:12px;
  font-size:16px;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:8px;
}

.row{
  border:1px solid #ddd;
  border-radius:8px;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
  background:#fff;
}

.row:hover{
  background:#f8f8f8;
}

.label{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.count{
  font-size:12px;
  color:#666;
  margin-top:8px;
}

.loading{
  text-align:center;
  padding:20px;
}

.error{
  color:red;
  padding:20px;
}
  .searchRow{
  display:flex;
  gap:8px;
  align-items:center;
}

.searchRow input{
  flex:1;
}

.clearBtn{
  padding:12px 16px;
  border:none;
  border-radius:8px;
  background:#666;
  color:white;
  cursor:pointer;
  white-space:nowrap;
}
  
</style>
</head>
<body>

<div id="loginBox" class="card">
  <h2>ログイン</h2>

  <input
    type="password"
    id="passwordInput"
    placeholder="パスワード">

  <br><br>

  <button onclick="login()">
    ログイン
  </button>

  <div id="loginError"
       style="color:red;margin-top:10px;">
  </div>
</div>

<div id="mainApp" style="display:none;">

<h1>東京都指定医療機関検索</h1>

<div id="loading" class="loading">
データ読込中...
</div>

<div id="files"></div>

<script>

let filesData = [];
let selectedRows = {};

const PASSWORD = "wakamiyaclub";

function login(){

  const input =
    document.getElementById(
      "passwordInput"
    );

  const error =
    document.getElementById(
      "loginError"
    );
if(
  input.value.trim() === PASSWORD
){

  localStorage.setItem(
    "facilityLoggedIn",
    "yes"
  );

    document
      .getElementById("loginBox")
      .style.display="none";

    document
      .getElementById("mainApp")
      .style.display="block";

    loadConfig();

  }else{

    error.textContent =
      "パスワードが違います";
  }
}

async function loadConfig(){

  const res = await fetch("config.json");
  const config = await res.json();

  for(const fileConfig of config.files){

    try{

      const response = await fetch(fileConfig.file);

      const buffer = await response.arrayBuffer();

      const workbook = XLSX.read(buffer,{
        type:"array"
      });

      const sheet =
        workbook.Sheets[
          workbook.SheetNames[0]
        ];

      const json =
        XLSX.utils.sheet_to_json(
          sheet,
          {
            header:1,
            defval:"",
            raw:false
          }
        );

      if(json.length===0) continue;

      // skipRows = 実データが始まるまでにスキップする行数
      // (タイトル行や複数行見出しに対応するため。省略時は1行のみスキップ)
      const skipRows =
        fileConfig.skipRows || 1;

      const headers =
        (json[skipRows-1] || [])
          .map(x=>String(x));

      const rows =
        json.slice(skipRows).map(
          row=>row.map(
            cell=>String(cell)
          )
        );

      filesData.push({
        name:fileConfig.name,
        version:fileConfig.version || "",
        headers,
        rows,
        searchColumns:
          fileConfig.searchColumns,
        displayColumns:
          fileConfig.displayColumns || null,
        id:crypto.randomUUID()
      });

    }catch(error){

      console.error(
        fileConfig.name,
        error
      );
    }
  }

  document
    .getElementById("loading")
    .style.display="none";

  render();
}

function searchRows(file,keyword){

  const words =
    keyword
      .toLowerCase()
      .replace(/　/g," ")
      .split(" ")
      .filter(Boolean);

  return file.rows.filter(row=>{

    const target =
      file.searchColumns
        .map(index=>row[index]||"")
        .join(" ")
        .toLowerCase();

    return words.every(word=>
      target.includes(word)
    );
  });
}

function makeDetail(file,row){

  const div =
    document.createElement("div");

  div.className="row";

  const indexes =
    file.displayColumns
      || row.map((_,i)=>i);

  indexes.forEach(index=>{

    const value = row[index];

    const label =
      document.createElement("div");

    label.className="label";

    label.textContent =
      file.headers[index] || "項目";

    const content =
      document.createElement("div");

    content.textContent = value;

    div.appendChild(label);
    div.appendChild(content);
  });

  return div;
}

 function render(){

  const files =
    document.getElementById("files");

  files.innerHTML="";

  filesData.forEach(file=>{

    const card =
      document.createElement("div");

    card.className="card";

    const title =
      document.createElement("h2");

    title.textContent = file.name;

    const version =
  document.createElement("div");

version.style.fontSize = "12px";
version.style.color = "#666";
version.style.marginBottom = "8px";

version.textContent = file.version;

const searchRow =
  document.createElement("div");

searchRow.className="searchRow";

const input =
  document.createElement("input");

input.type="text";
input.placeholder="検索";

const clearBtn =
  document.createElement("button");

clearBtn.className="clearBtn";
clearBtn.textContent="クリア";

clearBtn.onclick=()=>{

  input.value="";

  count.textContent="";

  resultArea.innerHTML="";

  delete selectedRows[file.id];

  input.focus();
};

    const count =
      document.createElement("div");

    count.className="count";

    const resultArea =
      document.createElement("div");

    input.addEventListener(
      "input",
      ()=>{

        const keyword =
          input.value.trim();

        resultArea.innerHTML="";
        count.textContent="";

        delete selectedRows[file.id];

        if(!keyword){
          return;
        }

        const results =
          searchRows(
            file,
            keyword
          );

        count.textContent =
          "検索結果 "
          + results.length
          + " 件";

        results
          .slice(0,100)
          .forEach(row=>{

            const rowDiv =
              makeDetail(
                file,
                row
              );

            rowDiv.onclick=()=>{

              selectedRows[file.id]=row;

              input.value="";

              count.textContent="";

              resultArea.innerHTML="";

              resultArea.appendChild(
                makeDetail(
                  file,
                  row
                )
              );
            };

            resultArea.appendChild(
              rowDiv
            );
          });
      }
    );

searchRow.appendChild(input);
searchRow.appendChild(clearBtn);

card.appendChild(title);
card.appendChild(version);
card.appendChild(searchRow);
card.appendChild(count);

    if(
      selectedRows[file.id]
    ){
      resultArea.appendChild(
        makeDetail(
          file,
          selectedRows[file.id]
        )
      );
    }

    card.appendChild(
      resultArea
    );

    files.appendChild(
      card
    );
  });
}

if(
  localStorage.getItem(
    "facilityLoggedIn"
  ) === "yes"
){

  document
    .getElementById("loginBox")
    .style.display="none";

  document
    .getElementById("mainApp")
    .style.display="block";

  loadConfig();
}

</script>

</div>

</body>
</html>
