<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>東京都指定医療機関検索</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  max-width:1200px;
  margin:auto;
  padding:16px;
  background:#f5f5f5;
}

h1{
  text-align:center;
}

.card{
  background:white;
  border-radius:12px;
  padding:16px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input[type=text]{
  width:100%;
  padding:12px;
  font-size:16px;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:8px;
}

.row{
  border:1px solid #ddd;
  border-radius:8px;
  padding:10px;
  margin-top:10px;
  cursor:pointer;
  background:#fff;
}

.row:hover{
  background:#f8f8f8;
}

.label{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.count{
  font-size:12px;
  color:#666;
  margin-top:8px;
}

.loading{
  text-align:center;
  padding:20px;
}

.error{
  color:red;
  padding:20px;
}
</style>
</head>
<body>

<h1>東京都指定医療機関検索</h1>

<div id="loading" class="loading">
データ読込中...
</div>

<div id="files"></div>

<script>

let filesData = [];
let selectedRows = {};

async function loadConfig(){

  const res = await fetch("config.json");
  const config = await res.json();

  for(const fileConfig of config.files){

    try{

      const response = await fetch(fileConfig.file);

      const buffer = await response.arrayBuffer();

      const workbook = XLSX.read(buffer,{
        type:"array"
      });

      const sheet =
        workbook.Sheets[
          workbook.SheetNames[0]
        ];

      const json =
        XLSX.utils.sheet_to_json(
          sheet,
          {
            header:1,
            defval:""
          }
        );

      if(json.length===0) continue;

      const headers =
        json[0].map(x=>String(x));

      const rows =
        json.slice(1).map(
          row=>row.map(
            cell=>String(cell)
          )
        );

      filesData.push({
        name:fileConfig.name,
        headers,
        rows,
        searchColumns:
          fileConfig.searchColumns,
        id:crypto.randomUUID()
      });

    }catch(error){

      console.error(
        fileConfig.name,
        error
      );
    }
  }

  document
    .getElementById("loading")
    .style.display="none";

  render();
}

function searchRows(file,keyword){

  const words =
    keyword
      .toLowerCase()
      .replace(/　/g," ")
      .split(" ")
      .filter(Boolean);

  return file.rows.filter(row=>{

    const target =
      file.searchColumns
        .map(index=>row[index]||"")
        .join(" ")
        .toLowerCase();

    return words.every(word=>
      target.includes(word)
    );
  });
}

function makeDetail(file,row){

  const div =
    document.createElement("div");

  div.className="row";

  row.forEach((value,index)=>{

    const label =
      document.createElement("div");

    label.className="label";

    label.textContent =
      file.headers[index] || "項目";

    const content =
      document.createElement("div");

    content.textContent = value;

    div.appendChild(label);
    div.appendChild(content);
  });

  return div;
}

 function render(){

  const files =
    document.getElementById("files");

  files.innerHTML="";

  filesData.forEach(file=>{

    const card =
      document.createElement("div");

    card.className="card";

    const title =
      document.createElement("h2");

    title.textContent = file.name;

    const input =
      document.createElement("input");

    input.type="text";
    input.placeholder="検索";

    const count =
      document.createElement("div");

    count.className="count";

    const resultArea =
      document.createElement("div");

    input.addEventListener(
      "input",
      ()=>{

        const keyword =
          input.value.trim();

        resultArea.innerHTML="";
        count.textContent="";

        delete selectedRows[file.id];

        if(!keyword){
          return;
        }

        const results =
          searchRows(
            file,
            keyword
          );

        count.textContent =
          "検索結果 "
          + results.length
          + " 件";

        results
          .slice(0,100)
          .forEach(row=>{

            const rowDiv =
              makeDetail(
                file,
                row
              );

            rowDiv.onclick=()=>{

              selectedRows[file.id]=row;

              input.value="";

              count.textContent="";

              resultArea.innerHTML="";

              resultArea.appendChild(
                makeDetail(
                  file,
                  row
                )
              );
            };

            resultArea.appendChild(
              rowDiv
            );
          });
      }
    );

    card.appendChild(title);
    card.appendChild(input);
    card.appendChild(count);

    if(
      selectedRows[file.id]
    ){
      resultArea.appendChild(
        makeDetail(
          file,
          selectedRows[file.id]
        )
      );
    }

    card.appendChild(
      resultArea
    );

    files.appendChild(
      card
    );
  });
}

loadConfig();

</script>

</body>
</html>
